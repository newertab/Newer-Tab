<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7762107676364310"
crossorigin="anonymous"></script>

<style>
:root {
  --nav-height: 56px;
  --bg: #0f172a;
  --bg-2: #111827;
  --border: #1f2937;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #38bdf8;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,sans-serif;
background:var(--bg);
color:var(--text);
overflow:hidden;
}

/* ================= CLOSED SCREEN ================= */

.closed-screen{
position:fixed;
inset:0;
z-index:99999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#020617;
overflow:hidden;
text-align:center;
}

/* animated dots */

.closed-screen::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(#38bdf8 1px, transparent 1px);
background-size:40px 40px;
opacity:.2;
animation:moveDots 40s linear infinite;
}

@keyframes moveDots{
from{transform:translate(0,0);}
to{transform:translate(-200px,-200px);}
}

.closed-content{
position:relative;
z-index:2;
max-width:700px;
padding:40px;
}

.closed-title{
font-size:56px;
font-weight:900;
margin-bottom:20px;
}

.closed-box{
background:#020617;
border:1px solid #1f2937;
border-radius:14px;
padding:22px;
margin-bottom:30px;
color:#9ca3af;
line-height:1.6;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.closed-link{
display:inline-block;
font-size:26px;
font-weight:800;
color:#38bdf8;
text-decoration:none;
padding:14px 28px;
border-radius:12px;
background:rgba(56,189,248,.1);
border:1px solid #38bdf8;
transition:.2s;
}

.closed-link:hover{
background:#38bdf8;
color:#000;
}

/* ================= Site ================= */

nav{
position:fixed;
inset:0 0 auto 0;
height:var(--nav-height);
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
background:var(--bg);
border-bottom:1px solid var(--border);
z-index:1000;
}

.title{
font-weight:800;
font-size:20px;
}

.tabs{
display:flex;
gap:6px;
flex:1;
align-items:center;
}

.tab{
padding:6px 12px;
border-radius:8px;
cursor:pointer;
display:flex;
gap:6px;
align-items:center;
}

.tab:hover{
background:var(--bg-2);
}

.tab.active{
background:rgba(56,189,248,.12);
box-shadow:inset 0 0 0 1px var(--accent);
font-weight:600;
}

#viewer{
position:fixed;
top:var(--nav-height);
left:0;
width:100%;
height:calc(100% - var(--nav-height));
border:none;
background:black;
}
</style>
</head>

<body>

<!-- ================= CLOSED SCREEN ================= -->

<div class="closed-screen">

  <div class="closed-content">

    <div class="closed-title">Site Closed</div>

    <div class="closed-box">
      Securely unblocked the other site so this one is closed and will stay
      closed unless they block the other site again.<br><br>

      So keep this one bookmarked, I don't wanna update two sites
      because I'm lazy so this one is closed.
    </div>

    <a class="closed-link"
       href="https://sites.google.com/view/totally-not-unblocked-games69"
       target="_blank">
       sites.google.com/view/totally-not-unblocked-games69
    </a>

  </div>

</div>

<!-- ================= Site ================= -->

<nav>
<div class="title">New Tab 2</div>
<div class="tabs" id="tabs"></div>
</nav>

<iframe id="viewer"></iframe>

<script src="games.js"></script>

<script>
const tabs = document.getElementById("tabs");
const iframe = document.getElementById("viewer");

function loadGame(name,url){
iframe.src=url;
}

function build(){
tabs.innerHTML="";
Object.entries(PAGES).forEach(([name,url])=>{
const tab=document.createElement("div");
tab.className="tab";
tab.textContent=name;
tab.onclick=()=>loadGame(name,url);
tabs.appendChild(tab);
});
}

build();
</script>

</body>
</html>
