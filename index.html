<script>
const tabs = document.getElementById("tabs");
const iframe = document.getElementById("viewer");

const ALLOWED_URL = "https://forms.gle/ctrT82F5z1aQ7Dcs7";

/* ================= GAME LOADING ================= */

function loadGame(name,url){
  iframe.src = url;
}

function build(){
  tabs.innerHTML="";
  Object.entries(PAGES).forEach(([name,url])=>{
    const tab=document.createElement("div");
    tab.className="tab";
    tab.textContent=name;
    tab.onclick=()=>loadGame(name,url);
    tabs.appendChild(tab);
  });
}

build();

/* ================= LOCKDOWN ================= */

function isAllowed(url){
  return url.startsWith(ALLOWED_URL);
}

function blockAllNavigation(){

  // Block window.open except allowed
  const originalOpen = window.open;
  window.open = function(url, ...args){
    if(url && isAllowed(url)){
      return originalOpen.call(window, url, ...args);
    }
    console.warn("Blocked popup:", url);
    return null;
  };

  // Block location changes
  const blockLocationChange = function(){
    console.warn("Blocked redirect attempt");
  };

  try{
    Object.defineProperty(window, "location", {
      value: window.location,
      writable: false
    });
  }catch(e){}

  // Block link clicks
  document.addEventListener("click", function(e){
    const link = e.target.closest("a");
    if(link){
      if(!isAllowed(link.href)){
        e.preventDefault();
        console.warn("Blocked link:", link.href);
      }
    }
  });

  // EXTRA: stop JS redirects like location.href=
  window.addEventListener("beforeunload", function(e){
    e.preventDefault();
    e.returnValue = "";
  });

  // STRICT iframe sandbox (THIS is the main fix)
  iframe.setAttribute(
    "sandbox",
    "allow-scripts allow-same-origin"
  );

  // Prevent iframe from navigating top (extra safety)
  iframe.onload = () => {
    try {
      const win = iframe.contentWindow;

      // kill popup attempts inside iframe
      win.open = () => null;

      // block redirects inside iframe
      Object.defineProperty(win, "location", {
        value: win.location,
        writable: false
      });

    } catch(e){
      // cross-origin, sandbox still protects us
    }
  };
}

/* ================= POPUP ================= */

const popup = document.getElementById("popup");
const enableBtn = document.getElementById("enableEmail");
const skipBtn = document.getElementById("skipBtn");

if(!localStorage.getItem("popupSeen")){
  popup.classList.remove("hidden");

  let timeLeft = 15;

  const timer = setInterval(()=>{
    timeLeft--;
    skipBtn.textContent = `Skip (${timeLeft})`;

    if(timeLeft <= 0){
      clearInterval(timer);
      skipBtn.disabled = false;
      skipBtn.textContent = "Skip";
      skipBtn.style.cursor = "pointer";
      skipBtn.style.color = "white";
    }
  },1000);

}else{
  blockAllNavigation();
}

// Allow ONLY this link
enableBtn.onclick = ()=>{
  window.open(ALLOWED_URL, "_blank");
  localStorage.setItem("popupSeen", "true");
  popup.classList.add("hidden");

  blockAllNavigation();
};

skipBtn.onclick = ()=>{
  popup.classList.add("hidden");
  localStorage.setItem("popupSeen", "true");

  blockAllNavigation();
};
</script>
