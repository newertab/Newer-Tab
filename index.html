<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7762107676364310"
crossorigin="anonymous"></script>

<style>
:root {
  --nav-height: 56px;
  --bg: #0f172a;
  --bg-2: #111827;
  --border: #1f2937;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #38bdf8;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,sans-serif;
background:var(--bg);
color:var(--text);
overflow:hidden;
}

/* ================= NAV ================= */

nav{
position:fixed;
inset:0 0 auto 0;
height:var(--nav-height);
display:flex;
align-items:center;
gap:14px;
padding:0 18px;
background:var(--bg);
border-bottom:1px solid var(--border);
z-index:1000;
}

.title{
font-weight:800;
font-size:20px;
}

.tabs{
display:flex;
gap:6px;
flex:1;
align-items:center;
}

.tab{
padding:6px 12px;
border-radius:8px;
cursor:pointer;
display:flex;
gap:6px;
align-items:center;
}

.tab:hover{
background:var(--bg-2);
}

.tab.active{
background:rgba(56,189,248,.12);
box-shadow:inset 0 0 0 1px var(--accent);
font-weight:600;
}

#viewer{
position:fixed;
top:var(--nav-height);
left:0;
width:100%;
height:calc(100% - var(--nav-height));
border:none;
background:black;
}

/* ================= POPUP ================= */

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
display:flex;
align-items:center;
justify-content:center;
z-index:2000;
animation:fadeIn .3s ease;
}

.popup-box{
background:var(--bg-2);
border:1px solid var(--border);
border-radius:16px;
padding:28px;
width:360px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
animation:popIn .35s ease;
}

.popup-title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.popup-text{
color:var(--muted);
font-size:14px;
margin-bottom:20px;
line-height:1.4;
}

.popup-buttons{
display:flex;
gap:10px;
justify-content:center;
}

.btn{
padding:10px 16px;
border-radius:10px;
border:none;
cursor:pointer;
background:var(--bg);
color:var(--text);
transition:.2s;
}

.btn:hover{
transform:translateY(-1px);
}

.btn.primary{
background:var(--accent);
color:#000;
font-weight:600;
}

.btn:disabled{
opacity:.5;
cursor:not-allowed;
}

.copied-msg{
margin-top:12px;
font-size:13px;
color:var(--accent);
opacity:0;
transition:.3s;
}

/* animations */
@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes popIn{
from{transform:scale(.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<!-- ================= POPUP ================= -->
<div id="popup" class="popup">
  <div class="popup-box">

    <div class="popup-title">Enable Email Notifications</div>

    <div class="popup-text">
      Enable email notifications so if this site gets blocked,
      you'll receive the new URL automatically.
    </div>

    <div class="popup-buttons">
      <button id="enableBtn" class="btn primary">
        Enable Notifications
      </button>

      <button id="skipBtn" class="btn" disabled>
        Skip (20)
      </button>
    </div>

    <div id="copiedMsg" class="copied-msg"></div>

  </div>
</div>

<!-- ================= NAV ================= -->
<nav>
<div class="title">New Tab 2</div>
<div class="tabs" id="tabs"></div>
</nav>

<iframe id="viewer"></iframe>

<script src="games.js"></script>

<script>
const tabs = document.getElementById("tabs");
const iframe = document.getElementById("viewer");

function loadGame(name,url){
iframe.src=url;
}

function build(){
tabs.innerHTML="";
Object.entries(PAGES).forEach(([name,url])=>{
const tab=document.createElement("div");
tab.className="tab";
tab.textContent=name;
tab.onclick=()=>loadGame(name,url);
tabs.appendChild(tab);
});
}

build();

/* ================= POPUP LOGIC ================= */

const popup = document.getElementById("popup");
const enableBtn = document.getElementById("enableBtn");
const skipBtn = document.getElementById("skipBtn");
const copiedMsg = document.getElementById("copiedMsg");

const FORM_LINK = "https://forms.gle/TUeMfjBxiSW6xQru9";

/* COPY BUTTON */
enableBtn.onclick = async () => {
  try {
    await navigator.clipboard.writeText(FORM_LINK);

    copiedMsg.textContent = "Copied to clipboard!";
    copiedMsg.style.opacity = "1";

    setTimeout(() => {
      copiedMsg.style.opacity = "0";
    }, 2500);

  } catch (err) {
    copiedMsg.textContent = "Copy failed. Please copy manually.";
    copiedMsg.style.opacity = "1";
  }
};

/* COUNTDOWN */
let time = 20;
skipBtn.textContent = `Skip (${time})`;

const timer = setInterval(() => {
  time--;

  if (time > 0) {
    skipBtn.textContent = `Skip (${time})`;
  } else {
    clearInterval(timer);
    skipBtn.textContent = "Skip";
    skipBtn.disabled = false;
  }
}, 1000);

/* CLOSE POPUP */
skipBtn.onclick = () => {
  popup.style.display = "none";
};
</script>

</body>
</html>
